<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customers - Salon Management System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        /* Navigation Bar */
        nav{
            background:#2c3e50;
            color:white;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav .logo{
            font-size:24px;
            font-weight:bold;
        }

        nav ul{
            list-style:none;
            display:flex;
            gap:20px;
        }

        nav ul li a{
            text-decoration:none;
            color:white;
            font-size:16px;
            transition:0.3s;
        }

        nav ul li a:hover{
            color:#f39c12;
        }

        /* Main Container */
        .container{
            width:90%;
            margin:40px auto;
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#2c3e50;
        }

        /* Table Styling */
        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        th{
            background:#34495e;
            color:white;
            padding:15px;
        }

        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f5f5f5;
        }

        .loading{
            text-align:center;
            font-size:18px;
            color:#555;
        }

        /* Gender Badge */
        .male{
            color:#3498db;
            font-weight:bold;
        }

        .female{
            color:#e91e63;
            font-weight:bold;
        }

        /* Responsive */
        @media(max-width:768px){

            nav{
                flex-direction:column;
                gap:10px;
            }

            nav ul{
                flex-wrap:wrap;
                justify-content:center;
            }

            table{
                display:block;
                overflow-x:auto;
            }
        }
    </style>
</head>

<body>

    <!-- Navigation Bar -->
    <nav>
        <div class="logo">SALOON MANAGEMENT SYSTEM</div>

        <ul>
            <li><a href="home.html">Home</a></li>
           <li><a href="customers.html">Customers</a></li>    
            <li><a href="employee.html">Employees</a></li>
            <li><a href="branch.html">Branches</a></li>
            <li><a href="services.html">Services</a></li>
         
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="container">

        <h1>Customer Management</h1>

        <table>
            <thead>
                <tr>
                    <th>Customer ID</th>
                    <th>Name</th>
                    <th>Phone</th>
                    <th>Email</th>
                    <th>Gender</th>
                </tr>
            </thead>

            <tbody id="customerTableBody">
                <tr>
                    <td colspan="5" class="loading">
                        Loading customer data...
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

    <script>

        const API_URL =
        "https://improved-space-dollop-wrwv9v4r97g9c5957-3000.app.github.dev/customers";

        async function fetchCustomers(){

            const tableBody =
            document.getElementById("customerTableBody");

            try{

                const response =
                await fetch(API_URL);

                if(!response.ok){
                    throw new Error(
                        `HTTP Error: ${response.status}`
                    );
                }

                const data =
                await response.json();

                tableBody.innerHTML = "";

                data.forEach(customer => {

                    const genderClass =
                    customer.gender.toLowerCase() === "male"
                    ? "male"
                    : "female";

                    const row =
                    document.createElement("tr");

                    row.innerHTML = `
                        <td>${customer.customer_id}</td>
                        <td>${customer.name}</td>
                        <td>${customer.phone}</td>
                        <td>${customer.email}</td>
                        <td class="${genderClass}">
                            ${customer.gender}
                        </td>
                    `;

                    tableBody.appendChild(row);
                });

            }
            catch(error){

                tableBody.innerHTML = `
                    <tr>
                        <td colspan="5">
                            Failed to load data:
                            ${error.message}
                        </td>
                    </tr>
                `;

                console.error(error);
            }
        }

        fetchCustomers();

    </script>

</body>
</html>
