<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Employee Management System</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background:#f4f6f9;
        }

        /* Navigation Bar */
        nav{
            background:#2c3e50;
            color:white;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        nav .logo{
            font-size:24px;
            font-weight:bold;
        }

        nav ul{
            list-style:none;
            display:flex;
            gap:20px;
        }

        nav ul li a{
            text-decoration:none;
            color:white;
            font-size:16px;
            transition:0.3s;
        }

        nav ul li a:hover{
            color:#f39c12;
        }

        /* Main Container */
        .container{
            width:90%;
            margin:40px auto;
        }

        h1{
            text-align:center;
            margin-bottom:25px;
            color:#2c3e50;
        }

        /* Table Styling */
        table{
            width:100%;
            border-collapse:collapse;
            background:white;
            border-radius:10px;
            overflow:hidden;
            box-shadow:0 4px 10px rgba(0,0,0,0.1);
        }

        th{
            background:#34495e;
            color:white;
            padding:15px;
        }

        td{
            padding:12px;
            text-align:center;
            border-bottom:1px solid #ddd;
        }

        tr:hover{
            background:#f5f5f5;
        }

        .loading{
            text-align:center;
            font-size:18px;
            color:#555;
            margin-top:20px;
        }

        /* Responsive Navbar */
        @media(max-width:768px){
            nav{
                flex-direction:column;
                gap:10px;
            }

            nav ul{
                flex-wrap:wrap;
                justify-content:center;
            }

            table{
                display:block;
                overflow-x:auto;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav>
        <div class="logo">SALOON MANAGEMENT SYSTEM</div>

        <ul>
            <li><a href="home.html">Home</a></li>
            <li><a href="customers.html">Customer</a></li>
            <li><a href="employee.html">Employees</a></li>
            
            <li><a href="branch.html">Branches</a></li>
            <li><a href="services.html">Services</a></li>
            
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="container">

        <h1>Employee Management System</h1>

        <table>
            <thead>
                <tr>
                    <th>Employee ID</th>
                    <th>Name</th>
                    <th>Role</th>
                    <th>Phone</th>
                    <th>Salary</th>
                    <th>Hire Date</th>
                    <th>Branch ID</th>
                </tr>
            </thead>

            <tbody id="employeeTableBody">
                <tr>
                    <td colspan="7" class="loading">
                        Loading employee data...
                    </td>
                </tr>
            </tbody>
        </table>

    </div>

    <script>

        const API_URL =
        'https://improved-space-dollop-wrwv9v4r97g9c5957-3000.app.github.dev/employee';

        async function fetchEmployees() {

            const tableBody =
                document.getElementById('employeeTableBody');

            try {

                const response = await fetch(API_URL);

                if (!response.ok) {
                    throw new Error(
                        `HTTP Error: ${response.status}`
                    );
                }

                const data = await response.json();

                tableBody.innerHTML = '';

                data.forEach(employee => {

                    const row =
                        document.createElement('tr');

                    const formattedDate =
                        new Date(employee.hire_date)
                        .toLocaleDateString();

                    row.innerHTML = `
                        <td>${employee.employee_id}</td>
                        <td>${employee.name}</td>
                        <td>${employee.role}</td>
                        <td>${employee.phone}</td>
                        <td>Rs. ${employee.salary}</td>
                        <td>${formattedDate}</td>
                        <td>${employee.branch_id}</td>
                    `;

                    tableBody.appendChild(row);
                });

            }
            catch(error){

                tableBody.innerHTML = `
                    <tr>
                        <td colspan="7">
                            Failed to load data:
                            ${error.message}
                        </td>
                    </tr>
                `;

                console.error(error);
            }
        }

        fetchEmployees();

    </script>

</body>
</html>
